<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cover Letter Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        :root {
            --bg: #f6f8fa;
            --bg-card: #ffffff;
            --bg-input: #f0f2f5;
            --bg-hover: #e8ecf1;
            --border: #d0d7de;
            --text: #1f2328;
            --text-secondary: #57606a;
            --text-muted: #8b949e;
            --accent: #2f81f7;
            --accent-hover: #1a6fd6;
            --accent-soft: #ddf4ff;
            --success: #1a7f37;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --font: 'Inter', -apple-system, sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --transition: 0.2s ease;
        }

        [data-theme="dark"] {
            --bg: #0d1117;
            --bg-card: #161b22;
            --bg-input: #0d1117;
            --bg-hover: #1c2333;
            --border: #30363d;
            --text: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --accent-soft: #1f2937;
            --success: #3fb950;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app {
            max-width: 820px;
            width: 100%;
            flex: 1;
        }

        .version-badge {
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.65rem;
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-left: 8px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            padding: 8px 0 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--bg-input);
            border: 1px solid var(--border);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-icon .fallback-icon {
            font-size: 1.2rem;
            color: var(--accent);
        }

        .logo span {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1rem;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-actions button:hover {
            background: var(--bg-hover);
            color: var(--text);
            border-color: var(--text-muted);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            transition: background var(--transition), border-color var(--transition);
        }

        .card-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            transition: background var(--transition), border-color var(--transition);
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(47, 129, 247, 0.15);
        }

        .form-group textarea {
            font-family: var(--mono);
            font-size: 0.85rem;
            line-height: 1.7;
            resize: vertical;
            min-height: 200px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 16px;
            }
        }

        .file-upload-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .file-upload-wrapper input[type="file"] {
            flex: 1;
            padding: 8px;
            border: 1px dashed var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .file-upload-wrapper .file-name {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: scale(1.01);
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-success:hover {
            opacity: 0.85;
            transform: scale(1.01);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-email {
            background: #ea4335;
            color: #fff;
        }

        .btn-email:hover {
            background: #d33426;
            transform: scale(1.01);
        }

        .btn-outlook {
            background: #0078d4;
            color: #fff;
        }

        .btn-outlook:hover {
            background: #006abc;
            transform: scale(1.01);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .output-box {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            min-height: 200px;
            font-family: var(--mono);
            font-size: 0.85rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text);
            transition: background var(--transition), border-color var(--transition);
            max-height: 400px;
            overflow-y: auto;
        }

        .output-box .empty-message {
            color: var(--text-muted);
            font-family: var(--font);
            text-align: center;
            padding: 40px 0;
        }

        .footer {
            margin-top: 32px;
            padding: 20px 0;
            border-top: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .footer .contact {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .footer .contact a {
            color: var(--accent);
            text-decoration: none;
        }
        .footer .contact a:hover {
            text-decoration: underline;
        }

        .digital-heroes-btn {
            background: #1a1a2e;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font);
        }

        .digital-heroes-btn:hover {
            background: #2d2d4e;
            transform: scale(1.02);
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
            max-width: 400px;
            width: 100%;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideUp 0.3s ease;
            font-size: 0.9rem;
            color: var(--text);
        }

        .toast i {
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .toast.success i {
            color: var(--success);
        }
        .toast.error i {
            color: #cf222e;
        }
        .toast.info i {
            color: var(--accent);
        }

        .toast .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            margin-left: auto;
            padding: 0 4px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .hidden {
            display: none !important;
        }
        .mt-8 {
            margin-top: 8px;
        }

        .email-client-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
    </style>
</head>

<body>

    <div class="app">

        <header class="header">
            <div class="header-left">
                <a href="#" class="logo">
                    <span class="logo-icon" id="logoContainer">
                        <i class="fas fa-envelope-pen fallback-icon"></i>
                    </span>
                    Cover<span>Letter</span>
                    <span class="version-badge">v2.1</span>
                </a>
            </div>
            <div class="header-actions">
                <button id="themeToggle" title="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="resetBtn" title="Reset all fields">
                    <i class="fas fa-eraser"></i>
                </button>
            </div>
        </header>

        <!-- Your Details -->
        <div class="card">
            <div class="card-title"><i class="fas fa-user"></i> Your Details</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="yourName">Your full name</label>
                    <input type="text" id="yourName" placeholder="e.g. Jane Smith" />
                </div>
                <div class="form-group">
                    <label for="yourPhone">Your phone (optional)</label>
                    <input type="text" id="yourPhone" placeholder="e.g. +44 7700 123456" />
                </div>
            </div>
        </div>

        <!-- Recipient & Company -->
        <div class="card">
            <div class="card-title"><i class="fas fa-building"></i> Recipient &amp; Company</div>
            <div class="form-group">
                <label for="recipientEmail">Recipient email</label>
                <input type="email" id="recipientEmail" placeholder="e.g. alex.chen@company.com" />
                <small style="color:var(--text-muted);font-size:0.75rem;display:block;margin-top:4px;">
                    <i class="fas fa-magic"></i> Name will be auto-extracted from email
                </small>
            </div>
            <div class="form-group">
                <label for="recipientName">Recipient name (auto-filled, editable)</label>
                <input type="text" id="recipientName" placeholder="Name will appear here" />
            </div>
            <div class="form-group">
                <label for="companyName">Company name</label>
                <input type="text" id="companyName" placeholder="e.g. Acme Corp" />
            </div>
        </div>

        <!-- CV Upload -->
        <div class="card">
            <div class="card-title"><i class="fas fa-paperclip"></i> Your CV</div>
            <div class="file-upload-wrapper">
                <input type="file" id="cvUpload" accept=".pdf,application/pdf" />
                <span class="file-name" id="fileName">No file chosen</span>
            </div>
        </div>

        <!-- Template Editor -->
        <div class="card">
            <div class="card-title"><i class="fas fa-pen-fancy"></i> Email Template</div>
            <div class="form-group">
                <label for="templateEditor">Edit your template – use <code>{recipient_name}</code>, <code>{company}</code>, <code>{your_name}</code>, <code>{your_phone}</code></label>
                <textarea id="templateEditor" rows="8">Subject: Application for a role at {company}

Dear {recipient_name},

I hope this email finds you well. I am writing to express my genuine interest in joining the team at {company}. Having followed your work, I'm impressed by your company's mission and the impact you're making in your field.

I believe my background and skills align well with what {company} is looking for. I've attached my CV for your review – it provides a full overview of my experience and achievements.

I would welcome the opportunity to discuss how I can contribute to {company}'s success. Please feel free to reach out to me at your convenience.

Thank you for your time and consideration.

Best regards,
{your_name}
{your_phone}</textarea>
            </div>
        </div>

        <!-- Actions -->
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;">
            <button class="btn btn-primary" id="generateBtn"><i class="fas fa-wand-magic-sparkles"></i> Generate Email</button>
        </div>

        <!-- Output -->
        <div class="card" id="outputCard">
            <div class="card-title"><i class="fas fa-envelope"></i> Your Email Preview</div>
            <div class="output-box" id="outputBox">
                <div class="empty-message">
                    <i class="fas fa-arrow-left" style="font-size:1.5rem;display:block;margin-bottom:8px;"></i>
                    Fill in the fields above and click <strong>Generate Email</strong>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-success" id="copyBtn"><i class="fas fa-copy"></i> Copy Email</button>
                <button class="btn btn-secondary" id="downloadCvBtn"><i class="fas fa-file-pdf"></i> Download CV</button>
            </div>
            <div class="email-client-row">
                <button class="btn btn-email" id="openGmailBtn"><i class="fas fa-envelope"></i> Open in Gmail</button>
                <button class="btn btn-outlook" id="openOutlookBtn"><i class="fas fa-envelope"></i> Open in Outlook</button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="contact">
                <span><strong>Built by:</strong> Siddhant Spiral</span>
                <span><a href="mailto:siddhantspiral@gmail.com">siddhantspiral@gmail.com</a></span>
            </div>
            <a href="https://digitalheroesco.com" target="_blank" class="digital-heroes-btn">
                <i class="fas fa-shield-halved"></i> Built for Digital Heroes
            </a>
        </div>

    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            'use strict';

            // DOM refs
            const yourName = document.getElementById('yourName');
            const yourPhone = document.getElementById('yourPhone');
            const recipientEmail = document.getElementById('recipientEmail');
            const recipientName = document.getElementById('recipientName');
            const companyName = document.getElementById('companyName');
            const cvUpload = document.getElementById('cvUpload');
            const fileName = document.getElementById('fileName');
            const templateEditor = document.getElementById('templateEditor');
            const generateBtn = document.getElementById('generateBtn');
            const outputBox = document.getElementById('outputBox');
            const copyBtn = document.getElementById('copyBtn');
            const downloadCvBtn = document.getElementById('downloadCvBtn');
            const resetBtn = document.getElementById('resetBtn');
            const themeToggle = document.getElementById('themeToggle');
            const toastContainer = document.getElementById('toastContainer');
            const openGmailBtn = document.getElementById('openGmailBtn');
            const openOutlookBtn = document.getElementById('openOutlookBtn');
            const logoContainer = document.getElementById('logoContainer');

            let uploadedPdfData = null;
            let lastGeneratedEmail = '';
            let lastSubject = '';

            // ----- Theme -----
            let currentTheme = localStorage.getItem('coverletter-theme') || 'light';

            function setTheme(theme) {
                currentTheme = theme;
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('coverletter-theme', theme);
                themeToggle.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' :
                    '<i class="fas fa-moon"></i>';
            }
            setTheme(currentTheme);
            themeToggle.addEventListener('click', () => setTheme(currentTheme === 'dark' ? 'light' : 'dark'));

            // ----- Toast -----
            function showToast(message, type = 'info', duration = 3000) {
                const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `
                    <i class="fas ${icons[type] || icons.info}"></i>
                    <span>${message}</span>
                    <button class="toast-close">&times;</button>
                `;
                toastContainer.appendChild(toast);
                toast.querySelector('.toast-close').addEventListener('click', () => toast.remove());
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, duration);
            }

            // ----- Auto-extract name from email -----
            function extractNameFromEmail(email) {
                if (!email) return '';
                const parts = email.split('@')[0];
                if (!parts) return '';
                let name = parts.replace(/[._\-]/g, ' ');
                const words = name.split(' ').filter(w => w.length > 0);
                const capitalised = words.map(w =>
                    w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
                );
                return capitalised.join(' ');
            }

            recipientEmail.addEventListener('input', function() {
                const extracted = extractNameFromEmail(this.value);
                if (extracted) {
                    recipientName.value = extracted;
                }
            });

            // ----- File upload -----
            cvUpload.addEventListener('change', function(e) {
                const file = this.files[0];
                if (file) {
                    fileName.textContent = file.name;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        uploadedPdfData = ev.target.result;
                        showToast(`CV "${file.name}" loaded (${(file.size/1024).toFixed(0)} KB)`, 'success');
                    };
                    reader.onerror = function() {
                        showToast('Failed to read PDF file.', 'error');
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    fileName.textContent = 'No file chosen';
                    uploadedPdfData = null;
                }
            });

            // ----- Generate email -----
            function generateEmail() {
                const name = yourName.value.trim();
                const phone = yourPhone.value.trim();
                const recipient = recipientName.value.trim();
                const company = companyName.value.trim();
                const template = templateEditor.value;

                if (!name) {
                    showToast('Please enter your name.', 'error');
                    return;
                }
                if (!recipient) {
                    showToast('Please enter the recipient name (or email to auto-fill).', 'error');
                    return;
                }
                if (!company) {
                    showToast('Please enter the company name.', 'error');
                    return;
                }

                let output = template
                    .replace(/\{your_name\}/g, name)
                    .replace(/\{your_phone\}/g, phone || '')
                    .replace(/\{recipient_name\}/g, recipient)
                    .replace(/\{company\}/g, company);

                if (!phone) {
                    output = output.replace(/\n\{your_phone\}/g, '');
                    output = output.replace(/\{your_phone\}/g, '');
                }

                // Extract subject
                let subject = '';
                const lines = output.split('\n');
                if (lines.length > 0 && lines[0].toLowerCase().startsWith('subject:')) {
                    subject = lines[0].replace(/^subject:\s*/i, '').trim();
                    output = lines.slice(1).join('\n').trim();
                } else {
                    subject = `Application for a role at ${company}`;
                }

                lastGeneratedEmail = output;
                lastSubject = subject;
                outputBox.innerHTML = output;
                showToast('Email generated!', 'success');
            }

            generateBtn.addEventListener('click', generateEmail);

            // ----- Copy email -----
            copyBtn.addEventListener('click', function() {
                const text = outputBox.textContent;
                if (!text || text.trim() === '') {
                    showToast('Nothing to copy. Generate an email first.', 'error');
                    return;
                }
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Email copied to clipboard!', 'success');
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    showToast('Email copied!', 'success');
                });
            });

            // ----- Download CV -----
            downloadCvBtn.addEventListener('click', function() {
                if (!uploadedPdfData) {
                    showToast('No CV uploaded. Please upload a PDF first.', 'error');
                    return;
                }
                const blob = new Blob([uploadedPdfData], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'CV.pdf';
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
                showToast('CV downloaded!', 'success');
            });

            // ----- Open in Gmail -----
            function openInGmail() {
                const email = recipientEmail.value.trim();
                const body = outputBox.textContent;
                if (!body || body.trim() === '' || body.includes('Fill in the fields')) {
                    showToast('Please generate an email first.', 'error');
                    return;
                }
                const subject = lastSubject || 'Application';
                const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.open(gmailUrl, '_blank');
                showToast('Opening Gmail...', 'info');
            }

            // ----- Open in Outlook -----
            function openInOutlook() {
                const email = recipientEmail.value.trim();
                const body = outputBox.textContent;
                if (!body || body.trim() === '' || body.includes('Fill in the fields')) {
                    showToast('Please generate an email first.', 'error');
                    return;
                }
                const subject = lastSubject || 'Application';
                const outlookUrl = `https://outlook.live.com/mail/0/deeplink/compose?to=${encodeURIComponent(email)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.open(outlookUrl, '_blank');
                showToast('Opening Outlook...', 'info');
            }

            openGmailBtn.addEventListener('click', openInGmail);
            openOutlookBtn.addEventListener('click', openInOutlook);

            // ----- Reset -----
            resetBtn.addEventListener('click', function() {
                yourName.value = '';
                yourPhone.value = '';
                recipientEmail.value = '';
                recipientName.value = '';
                companyName.value = '';
                cvUpload.value = '';
                fileName.textContent = 'No file chosen';
                uploadedPdfData = null;
                lastGeneratedEmail = '';
                lastSubject = '';
                outputBox.innerHTML = `
                    <div class="empty-message">
                        <i class="fas fa-arrow-left" style="font-size:1.5rem;display:block;margin-bottom:8px;"></i>
                        Fill in the fields above and click <strong>Generate Email</strong>
                    </div>
                `;
                showToast('All fields cleared.', 'info');
            });

            // ----- Keyboard shortcut: Ctrl+Enter -----
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    generateEmail();
                }
            });

            console.log('📧 Cover Letter Generator v2.1 loaded');
            console.log('✏️ Ctrl+Enter to generate email.');
            console.log('📧 Open in Gmail/Outlook buttons added.');

        })();
    </script>

</body>
</html>
